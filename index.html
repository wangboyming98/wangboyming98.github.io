<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥限时领券 | 外卖/酒店/打车5折起</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: #f8f9fa;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }
        .title {
            font-size: 26px;
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            line-height: 1.5;
        }
        .subtitle {
            font-size: 16px;
            color: #e63946;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .title span {
            color: #e63946;
            font-weight: bold;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px 15px;
            margin-bottom: 30px;
        }
        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: #333;
            padding: 10px 5px;
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        /* 鼠标悬浮/点击反馈，提升点击欲望 */
        .item:hover {
            background-color: #fef2f2;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(230, 57, 70, 0.1);
        }
        .item:active {
            transform: translateY(0);
        }
        .icon {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: #fff;
            margin-bottom: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }
        .text {
            font-size: 14px;
            line-height: 1.4;
            font-weight: 500;
        }
        /* 优惠标签，突出利益点 */
        .tag {
            font-size: 12px;
            color: #e63946;
            margin-top: 5px;
            font-weight: bold;
        }
        .footer {
            text-align: center;
            font-size: 16px;
            color: #333;
            line-height: 1.6;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .footer .highlight {
            color: #e63946;
            font-weight: bold;
            font-size: 18px;
        }
        .footer .note {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
        /* 倒计时/紧迫感提示（可选） */
        .urgent {
            text-align: center;
            font-size: 14px;
            color: #fff;
            background: #e63946;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">

            </a>

        </div>

        <div class="footer">

            <div style="font-size: 18px; font-weight: bold; margin: 10px 0;">一次领取，天天可用！</div>
            <div class="note">
                小店微利，无人工客服，不满意可极速退款<br>

            </div>

    </div>
</body>
</html>
